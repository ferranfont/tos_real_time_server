        premiumX.push(...leg.t); y2Vals.push(...ys);
      });
      // Spread line: net premium of the marked legs = sum(S/short) - sum(L/long),
      // adding every marked put and call, aligned by timestamp.
      const spreadLegs = selSeries.map(({ sel, data }) => {
        const leg = sel.side === "call" ? data.call : data.put;
        if (!leg || !leg.t || !leg.t.length) return null;
        return { t: leg.t, last: leg.last, sign: legSign(sel.strike, sel.side) };  // +1 short, -1 long
      }).filter(Boolean);
      if (spreadLegs.length) {
        const acc = new Map();  // timestamp -> { sum, count }
        for (const { t, last, sign } of spreadLegs) {
          for (let i = 0; i < t.length; i++) {
            const v = Number(last[i]);
            if (!Number.isFinite(v)) continue;
            const e = acc.get(t[i]) || { sum: 0, count: 0 };
            e.sum += sign * v; e.count += 1;
            acc.set(t[i], e);
          }
        }
        const n = spreadLegs.length;
        let st = [], sy = [];
        for (const [ts, e] of acc) if (e.count === n) { st.push(ts); sy.push(e.sum); }  // only where every leg has a value
        const order = st.map((_, i) => i).sort((a, b) => st[a] < st[b] ? -1 : st[a] > st[b] ? 1 : 0);
        st = order.map(i => st[i]);
        const syv = yTransform(st, order.map(i => sy[i]));
        if (st.length) {
          const ssv = emaSmooth(syv, GREEK_EMA);
          spreadTrace.push({ x: st, y: ssv, customdata: syv, type: "scatter", mode: "lines", name: "Spread",
            yaxis: "y2", line: { color: "#1d4ed8", width: 2.8 },
            hovertemplate: `%{x|%d/%m/%Y %H:%M}<br>Spread${pnlTag}${yfmtCd}<extra></extra>` });
          premiumX.push(...st); y2Vals.push(...ssv);
        }
      }
      // Hide/Show cycle: 0=all(legs+spread), 1=none, 2=legs only, 3=spread only.
      const pmode = state.premiumMode || 0;
      const premiumShown = [
        ...((pmode === 0 || pmode === 2) ? premiumTraces : []),
        ...((pmode === 0 || pmode === 3) ? spreadTrace : []),
      ];
      const hasPremium = premiumShown.length > 0;
      const sessionRange = selectedSessionRange();
      const xRange = sessionRange ? withRightPad(sessionRange, 0.12) : paddedTimeRange([...x, ...premiumX]);
      const chartFrameShape = {
        type: "rect", xref: "paper", yref: "paper", x0: 0, x1: 1, y0: 0, y1: 1,
        line: { color: "rgba(148, 163, 184, 0.42)", width: 1 },
        fillcolor: "rgba(0,0,0,0)", layer: "above"
      };
      // Anchor entry: dotted vertical marker at the chosen HH:MM. The "Entry HH:MM"
      // label sits at the x-axis base; the line starts at the label's TOP edge (never
      // inside the box) and rises to the top of the chart.
      const anchorTs = anchorActiveTs;
      const anchorHM = anchorTs ? anchorTs.slice(11, 16) : "";
      const _chartEl = $("chart");
      const _plotH = _chartEl ? Math.max(1, _chartEl.getBoundingClientRect().height - 76 - 38) : 800;
      const ENTRY_BOX_PX = 23;  // approx height of the "Entry HH:MM" label box
      const anchorY0 = Math.min(0.5, ENTRY_BOX_PX / _plotH);  // top edge of the box, in paper units
      const anchorOverlay = anchorTs
        ? {
            shapes: [{ type: "line", xref: "x", yref: "paper", x0: anchorTs, x1: anchorTs, y0: anchorY0, y1: 1,
              line: { color: "rgba(255,255,255,0.5)", width: 1, dash: "dot" }, layer: "above" }],
            annotations: [{ xref: "x", yref: "paper", x: anchorTs, y: 0, xanchor: "center", yanchor: "bottom",
              text: `Entry ${anchorHM}`, showarrow: false, font: { color: "#e5e7eb", size: 11, weight: 400 },
              bgcolor: "rgba(0,0,0,0)", bordercolor: "rgba(255,255,255,0.5)", borderwidth: 1, borderpad: 3 }]
          }
        : { shapes: [], annotations: [] };
      // Buy/Sell arrow at the anchor, on the Spread line (0 when rebased). Net credit
      // (sum of S minus L > 0) = sell/short -> red arrow above pointing down; net debit
      // (< 0) = buy -> green arrow below pointing up.
      if (anchorTs) {
        let spreadEntryNet = 0, hasSpread = false;
        state.selected.forEach(sel => {
          const data = state.series[seriesKey(sel.strike)];
          if (!data) return;
          const leg = sel.side === "call" ? data.call : data.put;
          if (!leg || !leg.t || !leg.t.length) return;
          const e = premiumAtTs(leg, anchorTs);
          if (!Number.isFinite(e)) return;
          spreadEntryNet += legSign(sel.strike, sel.side) * e;
          hasSpread = true;
        });
        if (hasSpread && Math.abs(spreadEntryNet) > 1e-9) {
          const markerAbove = spreadEntryNet > 0;
          anchorOverlay.annotations.push({
            xref: "x", yref: "y2", x: anchorTs, y: 0,
            yshift: markerAbove ? 20 : -20, showarrow: false,
            text: String.fromCharCode(9660),
            font: { color: markerAbove ? "#ff3b4f" : "#00e676", size: 24 },
            bgcolor: "rgba(0,0,0,0)", borderpad: 0
          });
        }
      }
      // Gamma-by-strike profile: horizontal bars diverging from a center vline, length
      // proportional to |gamma| (no scale). Cyan = gamma positiva, violeta = negativa.
      const gammaShapes = [];
      if (state.showGamma && state.gamma && Array.isArray(state.gamma.strikes)) {
        const gs = state.gamma.strikes.filter(s => Number.isFinite(s.strike) && Number.isFinite(s.gamma) && s.gamma !== 0);
        const maxAbs = gs.reduce((m, s) => Math.max(m, Math.abs(s.gamma)), 0) || 1;
        const CENTER = 0.5, MAXLEN = 0.4;
        gammaShapes.push({ type: "line", xref: "paper", yref: "paper", x0: CENTER, x1: CENTER, y0: 0, y1: 1,
          line: { color: "rgba(255,255,255,0.30)", width: 1, dash: "dot" }, layer: "below" });
        for (const s of gs) {
          const len = (Math.abs(s.gamma) / maxAbs) * MAXLEN;
          gammaShapes.push({ type: "line", xref: "paper", yref: "y",
            x0: CENTER, x1: CENTER + (s.gamma > 0 ? len : -len), y0: s.strike, y1: s.strike,
            line: { color: s.gamma > 0 ? "#2dd4bf" : "#a855f7", width: 3 }, layer: "below" });
        }
      }
      // Gamma walls: horizontal reference lines at major_positive (G+) / major_negative (G-).
      const wallShapes = [], wallAnnos = [];
      if (state.showWalls && state.gamma) {
        for (const w of [
          { v: state.gamma.major_long_gamma, color: "rgba(45,212,191,0.5)", label: "Long Gamma" },
          { v: state.gamma.major_short_gamma, color: "rgba(168,85,247,0.5)", label: "Short Gamma" },
          { v: state.gamma.major_positive, color: "rgba(45,212,191,0.5)", label: "Major Positive" },
          { v: state.gamma.major_negative, color: "rgba(168,85,247,0.5)", label: "Major Negative" },
          { v: state.gamma.gamma_flip, color: "rgba(255,212,0,0.5)", label: "Flip" },
        ]) {
          if (!Number.isFinite(w.v)) continue;
          wallShapes.push({ type: "line", xref: "paper", yref: "y", x0: 0, x1: 1, y0: w.v, y1: w.v,
            line: { color: w.color, width: 1, dash: "dash" }, layer: "above" });
          wallAnnos.push({ xref: "paper", yref: "y", x: 0, y: w.v, xanchor: "left", yanchor: "middle",
            text: `${w.label} ${fmtStrike0(w.v)}`, showarrow: false, font: { color: w.color, size: 10, weight: 700 },
            bgcolor: "rgba(11,14,20,0.5)", bordercolor: w.color, borderwidth: 1, borderpad: 2 });
        }
      }
      const layout = {
        uirevision: `${state.symbol}-${state.chartRangeKey}-manual-zoom`,
        paper_bgcolor: "rgba(0,0,0,0)", plot_bgcolor: "rgba(0,0,0,0)", separators: ",.",
        font: { color: "#cbd5e1", family: "Inter, Arial, sans-serif", size: 11 },
        margin: { l: state.stratMode ? 380 : 54, r: state.stratMode ? 359 : 359, t: 76, b: 38 },
        showlegend: false,
        hovermode: "closest", dragmode: "pan",
        xaxis: { range: xRange, showgrid: false, color: "#dbeafe", showline: true, mirror: true, linecolor: "#3a4453", linewidth: 1, tickfont: { color: "#dbeafe", size: 10 }, zeroline: false },
        yaxis: { range: [yLo, yHi], showgrid: true, gridcolor: "#15191f", showline: true, mirror: true, linecolor: "#3a4453", linewidth: 1, color: "#cbd5e1", zeroline: false, tickformat: ",.2f" },
        yaxis2: { overlaying: "y", side: "right", autorange: true, showgrid: false, showline: true, linecolor: "#3a4453", linewidth: 1, zeroline: (!!anchorActiveTs || pct), zerolinecolor: "rgba(29,78,216,0.4)", zerolinewidth: 1.5, color: "#cbd5e1", tickformat: pct ? ",.1f" : ",.0f", ticksuffix: pct ? "%" : "" },
        shapes: [
          chartFrameShape,
          { type: "line", xref: "paper", yref: "y", x0: 0, x1: 1, y0: lastSpot, y1: lastSpot, line: { color: "#22d3ee", width: 1 }, layer: "above" },
          ...gammaShapes,
          ...wallShapes,
          ...strikeOverlays.shapes,
          ...anchorOverlay.shapes
        ],
        annotations: [
          { xref: "paper", yref: "y", x: 1, y: lastSpot, xanchor: "right", yanchor: "middle", text: `Bid ${fmt2(lastSpot)}`, showarrow: false, font: { color: "#22d3ee", size: 11, weight: 700 }, bgcolor: "rgba(11,14,20,0.85)", bordercolor: "#22d3ee", borderwidth: 1, borderpad: 3 },
          ...wallAnnos,
          ...strikeOverlays.annotations,
          ...anchorOverlay.annotations
        ]
      };
      if (!hasPremium) {
        layout.yaxis2 = { overlaying: "y", side: "right", visible: false };  // hide (not delete) so react drops the ghost
      } else {
        const r2 = robustRange(y2Vals);   // fit the right axis to the bulk, not outlier spikes
        if (r2) { layout.yaxis2.autorange = false; layout.yaxis2.range = r2; }
      }
      // Legend identifies each selected contract line when one or more is plotted.
      layout.showlegend = hasPremium;
      layout.legend = { orientation: "h", x: 0.5, y: 0.03, xanchor: "center", yanchor: "bottom",
        font: { color: "#cbd5e1", size: 10 }, bgcolor: "rgba(0,0,0,0)", borderwidth: 0 };
      // Long/Short gamma-wall migration over the day: solid, faint (opacity 0.4),
      // thin (width 1) lines on the price axis, drawn under everything else.
      const gammaHistTraces = [];
      if (state.showWalls && state.showGammaHistory && Array.isArray(state.gammaHistory) && state.gammaHistory.length) {
        const ht = state.gammaHistory.map(p => p.t);
        const mkLine = (key, color, label) => {
          const yv = state.gammaHistory.map(p => Number.isFinite(p[key]) ? p[key] : null);
          if (!yv.some(Number.isFinite)) return null;
          return { x: ht, y: yv, type: "scatter", mode: "lines", name: label, yaxis: "y",
            line: { color, width: 1, shape: "linear" }, opacity: 0.4, connectgaps: true,
            showlegend: false, hovertemplate: `%{x|%d/%m %H:%M}<br>${label}: %{y:,.0f}<extra></extra>` };
        };
        const a = mkLine("major_long_gamma", "#2dd4bf", "Long Î³");
        const b = mkLine("major_short_gamma", "#a855f7", "Short Î³");
        if (a) gammaHistTraces.push(a);
        if (b) gammaHistTraces.push(b);
      }
      // Greeks: option greeks over time (solid, width 1). Delta shows whenever Greeks is
      // on; Gamma/Theta/Vega are added with their own sub-buttons. Each greek has its own
      // overlaid left y-axis (very different scales); only Delta shows a scale ([-1,1]),
      // the rest are identified by legend colour + hover. One line per selected contract.
      // Spread cycle (greeks + IV): 0=All (per-leg + net), 1=Legs only, 2=Spread/net only.
      const smode = state.spreadMode || 0;
      const showGreekLegs = (smode === 0 || smode === 1);
      const showGreekNet = (smode === 0 || smode === 2);
      const greekTraces = [];
      if (state.showGreeks) {
        const GREEKS = [
          { key: "delta", axis: "yaxis3", ref: "y3", color: "#f97316", name: "Delta", clamp: [-1, 1], fmt: ".2f", on: state.greekDelta },
          { key: "gamma", axis: "yaxis4", ref: "y4", color: "#e879f9", name: "Gamma", clamp: null,     fmt: ".4f", on: state.greekGamma },
          { key: "theta", axis: "yaxis5", ref: "y5", color: "#bdb76b", name: "Theta", clamp: null,     fmt: ".2f", on: state.greekTheta },
          { key: "vega",  axis: "yaxis6", ref: "y6", color: "#a3e635", name: "Vega",  clamp: null,     fmt: ".3f", on: state.greekVega },
        ];
        GREEKS.forEach(g => {
          if (!g.on) return;
          const vals = [];
          if (showGreekLegs) {
            // Detail: one line per marked leg.
            selSeries.forEach(({ sel, data }) => {
              const leg = sel.side === "call" ? data.call : data.put;
              if (!leg || !leg.t || !leg.t.length || !Array.isArray(leg[g.key])) return;
              const yv = leg[g.key].map(v => Number.isFinite(v) ? v : null);
              if (!yv.some(Number.isFinite)) return;
              const ys = emaSmooth(yv, GREEK_EMA);
              greekTraces.push({ x: leg.t, y: ys, customdata: yv, type: "scatter", mode: "lines",
                name: `${g.name} ${sel.side} ${sel.strike}`, yaxis: g.ref,
                line: { color: g.color, width: 1 }, connectgaps: true, showlegend: false,
                hovertemplate: `%{x|%d/%m %H:%M}<br>${g.name} ${sel.side} ${sel.strike}: %{customdata:${g.fmt}}<extra></extra>` });
              ys.forEach(v => { if (Number.isFinite(v)) vals.push(v); });
            });
          }
          if (showGreekNet) {
            // Net POSITION greek across the marked legs: long +greek, short -greek
            // (opposite sign to the premium Spread's credit convention). Any offsetting
            // legs cancel automatically. Drawn in the greek's own colour.
            const acc = new Map(); let n = 0;
            selSeries.forEach(({ sel, data }) => {
              const leg = sel.side === "call" ? data.call : data.put;
              if (!leg || !leg.t || !Array.isArray(leg[g.key])) return;
              const sign = -legSign(sel.strike, sel.side); n++;  // position greek: long +1 / short -1
              for (let i = 0; i < leg.t.length; i++) {
                const v = Number(leg[g.key][i]);
                if (!Number.isFinite(v)) continue;
                const e = acc.get(leg.t[i]) || { s: 0, c: 0 };
                e.s += sign * v; e.c++; acc.set(leg.t[i], e);
              }
            });
            let st = [], sy = [];
            for (const [ts, e] of acc) if (n > 0 && e.c === n) { st.push(ts); sy.push(e.s); }
            const ord = st.map((_, i) => i).sort((a, b) => st[a] < st[b] ? -1 : st[a] > st[b] ? 1 : 0);
            st = ord.map(i => st[i]); sy = ord.map(i => sy[i]);
            if (st.length) {
              const ss = emaSmooth(sy, GREEK_EMA);
              greekTraces.push({ x: st, y: ss, customdata: sy, type: "scatter", mode: "lines",
                name: `Spread ${g.name}`, yaxis: g.ref,
                line: { color: g.color, width: 1.8 }, connectgaps: true, showlegend: false,
                hovertemplate: `%{x|%d/%m %H:%M}<br>Spread ${g.name}: %{customdata:${g.fmt}}<extra></extra>` });
              ss.forEach(v => { if (Number.isFinite(v)) vals.push(v); });
            }
          }
          if (!vals.length) return;
          let lo = Math.min(...vals), hi = Math.max(...vals);
          const span = hi - lo;
          const pad = span > 1e-9 ? span * 0.15 : Math.max(Math.abs(hi) * 0.5, 1e-4);
          lo -= pad; hi += pad;
          if (g.clamp && !showGreekNet) { lo = Math.max(g.clamp[0], lo); hi = Math.min(g.clamp[1], hi); }
          const isActiveAxis = (g.key === state.greekActiveAxis);
          layout[g.axis] = {
            overlaying: "y", side: "left", anchor: "free", position: 0,
            range: [lo, hi], visible: isActiveAxis, showgrid: false, zeroline: false,
            showticklabels: isActiveAxis, showline: false, ticks: "",
            color: g.color, tickfont: { color: g.color, size: 9 },
            ticklabelposition: "inside", tickformat: g.fmt
          };
        });
      }
      // IV: implied-volatility curve over time (violet), independent of Greeks, own axis (y7).
      const ivTraces = [];
      if (state.showIV) {
        const ivVals = [];
        if (showGreekLegs) selSeries.forEach(({ sel, data }) => {  // per-leg IV (hidden in Spread-only mode)
          const leg = sel.side === "call" ? data.call : data.put;
          if (!leg || !leg.t || !leg.t.length || !Array.isArray(leg.impl_vol)) return;
          const yv = leg.impl_vol.map(v => Number.isFinite(v) ? v : null);
          if (!yv.some(Number.isFinite)) return;
          const ys = emaSmooth(yv, GREEK_EMA);
          ivTraces.push({ x: leg.t, y: ys, customdata: yv, type: "scatter", mode: "lines",
            name: `IV ${sel.side} ${sel.strike}`, yaxis: "y7",
            line: { color: "#8b5cf6", width: 1 }, connectgaps: true, showlegend: false,
            hovertemplate: `%{x|%d/%m %H:%M}<br>IV ${sel.side} ${sel.strike}: %{customdata:.1%}<extra></extra>` });
          ys.forEach(v => { if (Number.isFinite(v)) ivVals.push(v); });
        });
        // Net mode: also draw the average IV across the marked legs, in the IV colour.
        if (showGreekNet) {
          const acc = new Map();
          selSeries.forEach(({ sel, data }) => {
            const leg = sel.side === "call" ? data.call : data.put;
            if (!leg || !leg.t || !Array.isArray(leg.impl_vol)) return;
            for (let i = 0; i < leg.t.length; i++) { const v = Number(leg.impl_vol[i]); if (!Number.isFinite(v)) continue; const e = acc.get(leg.t[i]) || { s: 0, c: 0 }; e.s += v; e.c++; acc.set(leg.t[i], e); }
          });
          let st = [], sy = [];
          for (const [ts, e] of acc) if (e.c > 0) { st.push(ts); sy.push(e.s / e.c); }
          const ord = st.map((_, i) => i).sort((a, b) => st[a] < st[b] ? -1 : st[a] > st[b] ? 1 : 0);
          st = ord.map(i => st[i]); sy = ord.map(i => sy[i]);
          if (st.length) {
            const ss = emaSmooth(sy, GREEK_EMA);
            ivTraces.push({ x: st, y: ss, customdata: sy, type: "scatter", mode: "lines", name: "IV media", yaxis: "y7",
              line: { color: "#8b5cf6", width: 1.8 }, connectgaps: true, showlegend: false,
              hovertemplate: `%{x|%d/%m %H:%M}<br>IV media: %{customdata:.1%}<extra></extra>` });
            sy.forEach(v => { if (Number.isFinite(v)) ivVals.push(v); });
          }
        }
        if (ivVals.length) {
          let lo = Math.min(...ivVals), hi = Math.max(...ivVals);
          const span = hi - lo, pad = span > 1e-9 ? span * 0.15 : Math.max(Math.abs(hi) * 0.5, 1e-4);
          lo -= pad; hi += pad;
          layout.yaxis7 = {
            overlaying: "y", side: "left", anchor: "free", position: 0,
            range: [Math.max(0, lo), hi], visible: true, showgrid: false, zeroline: false,
            showticklabels: true, showline: false, ticks: "",
            color: "#8b5cf6", tickfont: { color: "#8b5cf6", size: 9 },
            ticklabelposition: "inside", tickformat: ".0%"
          };
        }
      }
      // Toggle: hide the underlying line, but keep the chart frame/axes visible.
      const chartTraces = state.hideUnderlying ? [...gammaHistTraces, ...premiumShown, ...greekTraces, ...ivTraces] : [...gammaHistTraces, trace, ...premiumShown, ...greekTraces, ...ivTraces];
      if (state.hideUnderlying) {
        layout.shapes = [chartFrameShape, ...gammaShapes, ...wallShapes, ...strikeOverlays.shapes, ...anchorOverlay.shapes];
        layout.annotations = [...wallAnnos, ...strikeOverlays.annotations, ...anchorOverlay.annotations];
        layout.yaxis.showgrid = false;
        if (layout.yaxis2) {
          layout.yaxis2.showgrid = true;
          layout.yaxis2.gridcolor = "rgba(148,163,184,0.14)";
          layout.yaxis2.griddash = "solid";
        }
        if (premiumX.length) layout.xaxis.range = state.userRange && state.userRange.xaxis ? state.userRange.xaxis : paddedTimeRange(premiumX);
      }
      if (state.userRange) {
        if (state.userRange.xaxis) layout.xaxis.range = state.userRange.xaxis;
        if (state.userRange.yaxis) layout.yaxis.range = state.userRange.yaxis;
      }
      // Plotly.react keeps overlay axes from previous renders; explicitly hide any not
      // used this frame so their labels/lines don't linger (delta axis when Greeks off, etc.).
      ["yaxis2", "yaxis3", "yaxis4", "yaxis5", "yaxis6", "yaxis7"].forEach(k => {
        if (!layout[k]) layout[k] = { overlaying: "y", visible: false };
      });
      state.applyingLayout = true;
      Plotly.react("chart", chartTraces, layout, { responsive: true, displaylogo: false, scrollZoom: true, modeBarButtonsToRemove: ["lasso2d", "select2d"] })
        .then(() => { state.applyingLayout = false; bindPlotlyRangeEvents(); })
        .catch(() => { state.applyingLayout = false; });
    }

    function bindPlotlyRangeEvents() {
      const chart = $("chart");
      if (!chart || chart.__tosRangeBound || !chart.on) return;
      chart.__tosRangeBound = true;
      chart.on("plotly_relayout", ev => {
        if (state.applyingLayout || !ev) return;
        if (ev["xaxis.autorange"] || ev["yaxis.autorange"]) {
          state.userRange = null;
          return;
        }
        const nextRange = state.userRange ? { ...state.userRange } : {};
        if (ev["xaxis.range[0]"] !== undefined && ev["xaxis.range[1]"] !== undefined) {
          nextRange.xaxis = [ev["xaxis.range[0]"], ev["xaxis.range[1]"]];
        }
        if (ev["xaxis.range"] !== undefined) nextRange.xaxis = ev["xaxis.range"];
        if (ev["yaxis.range[0]"] !== undefined && ev["yaxis.range[1]"] !== undefined) {
          nextRange.yaxis = [ev["yaxis.range[0]"], ev["yaxis.range[1]"]];
        }
        if (ev["yaxis.range"] !== undefined) nextRange.yaxis = ev["yaxis.range"];
        state.userRange = Object.keys(nextRange).length ? nextRange : null;
      });
      chart.on("plotly_doubleclick", () => { state.userRange = null; });
    }

    async function loadText(text, sourceLabel) {
      state.rows = parseCsv(text);
      render();
      maybeRefreshPayoffFromCsv();
    }
    async function loadFile(file) {
      if (!file) return;
      state.file = file;
      state.previousClose = null;
      await loadText(await file.text(), "CSV");
    }
    async function loadPreviousClose() {
      state.previousClose = null;
      if (!state.httpMode) return;
      try {
        const url = new URL("/api/previous-close", location.origin);
        url.searchParams.set("ticker", state.symbol);
        const day = currentDay();
        if (day) url.searchParams.set("date", day);
        url.searchParams.set("ts", Date.now());
        const data = await (await fetch(url, { cache: "no-store" })).json();
        const close = Number(data && data.close);
        state.previousClose = Number.isFinite(close) && close > 0 ? close : null;
      } catch (_) {
        state.previousClose = null;
      }
    }
    async function loadHttpCsv() {
      // Underlying follows the selected session day (calendar), so a past day shows
      // that day's recorded CSV; today stays live.
      const url = new URL("/api/tos-live-csv", location.origin);
      url.searchParams.set("ticker", state.symbol);
      const day = currentDay();
      if (day) url.searchParams.set("date", day);
      url.searchParams.set("ts", Date.now());
      const res = await fetch(url, { cache: "no-store" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      await loadPreviousClose();
      await loadText(await res.text(), "HTTP CSV");
    }
    // Re-fetch the selected contracts' premium series (fresh latest tick), replacing
    // them in the cache without clearing first (so the lines/P&L don't flicker).
    async function refreshSelectedSeries() {
      const strikes = [...new Set(state.selected.map(s => s.strike))];
      await Promise.all(strikes.map(async strike => {
        try {
          const url = new URL("/api/premium-series", location.origin);
          url.searchParams.set("ticker", state.symbol);
          url.searchParams.set("strike", strike);
          if (currentDay()) url.searchParams.set("date", currentDay());
          if (currentExp()) url.searchParams.set("expiration", currentExp());
          url.searchParams.set("ts", Date.now());
          const data = await (await fetch(url, { cache: "no-store" })).json();
          if (data && !data.error) state.series[seriesKey(strike)] = data;
        } catch (_) {}
      }));
    }
    // Gamma-by-strike snapshot (from the friend's server, stored in data/gamma/ CSV).
    async function loadGamma() {
      try {
        const url = new URL("/api/gamma", location.origin);
        url.searchParams.set("ticker", state.symbol);
        if (currentDay()) url.searchParams.set("date", currentDay());
        url.searchParams.set("ts", Date.now());
        const data = await (await fetch(url, { cache: "no-store" })).json();
        state.gamma = (data && Array.isArray(data.strikes) && data.strikes.length) ? data : null;
      } catch (_) { state.gamma = null; }
    }
    // Time series of the session-level gamma-wall levels (one point per snapshot),
    // for the Long/Short gamma migration lines over the day.
    async function loadGammaHistory() {
      try {
        const url = new URL("/api/gamma-history", location.origin);
        url.searchParams.set("ticker", state.symbol);
        if (currentDay()) url.searchParams.set("date", currentDay());
        url.searchParams.set("ts", Date.now());
        const data = await (await fetch(url, { cache: "no-store" })).json();
        state.gammaHistory = (data && Array.isArray(data.points) && data.points.length) ? data.points : null;
      } catch (_) { state.gammaHistory = null; }
    }
    async function refreshFile() {
      try {
        if (state.httpMode) await loadHttpCsv();
        else if (state.file) await loadFile(state.file);
        if (state.selected.length) { await refreshSelectedSeries(); if (!state.stratMode && state.rows.length) render(); }
        if (state.showGamma || state.showWalls) { await loadGamma(); if (state.showWalls && state.showGammaHistory) await loadGammaHistory(); if (!state.stratMode && state.rows.length) render(); }
      } catch (err) {
        $("status").className = "status err";
        $("status").textContent = "error CSV";
      }
    }
    $("gammaToggle").addEventListener("click", async () => {
      state.showGamma = !state.showGamma;
      $("gammaToggle").classList.toggle("active", state.showGamma);
      if (state.showGamma) await loadGamma(); else if (!state.showWalls) state.gamma = null;
      render();
    });
    // Greeks: draw the selected option's delta over time (needs the premium series,
    // which now carries delta). Refresh the series so delta is fresh when turned on.
    $("greeksToggle").addEventListener("click", async () => {
      state.showGreeks = !state.showGreeks;
      $("greeksToggle").classList.toggle("active", state.showGreeks);
      $("greekSubs").hidden = !state.showGreeks;  // per-greek buttons only while Greeks is on
      if (state.showGreeks) {
        [["greekDeltaBtn", "greekDelta"], ["greekGammaBtn", "greekGamma"], ["greekThetaBtn", "greekTheta"], ["greekVegaBtn", "greekVega"]]
          .forEach(([id, flag]) => $(id).classList.toggle("active", state[flag]));  // reflect current on/off
        if (state.selected.length) await refreshSelectedSeries();
      }
      render();
    });
    // IV: independent toggle for the implied-volatility curve (violet, own axis).
    $("ivToggle").addEventListener("click", async () => {
      state.showIV = !state.showIV;
      $("ivToggle").classList.toggle("active", state.showIV);
      if (state.showIV && state.selected.length) await refreshSelectedSeries();
      render();
    });
    // Per-greek toggles (Delta/Gamma/Theta/Vega). Pressing one shows its line AND makes
    // the left axis switch to that greek's scale (greekActiveAxis = last pressed on).
    [["greekDeltaBtn", "greekDelta", "delta"], ["greekGammaBtn", "greekGamma", "gamma"], ["greekThetaBtn", "greekTheta", "theta"], ["greekVegaBtn", "greekVega", "vega"]].forEach(([id, flag, key]) => {
      $(id).addEventListener("click", () => {
        state[flag] = !state[flag];
        $(id).classList.toggle("active", state[flag]);
        if (state[flag]) {
          state.greekActiveAxis = key;
        } else if (state.greekActiveAxis === key) {
          const on = [["greekDelta", "delta"], ["greekGamma", "gamma"], ["greekTheta", "theta"], ["greekVega", "vega"]].find(([f]) => state[f]);
          state.greekActiveAxis = on ? on[1] : null;
        }
        render();
      });
    });
    // Spread cycle (greeks + IV): 0=All (per-leg + net) -> 1=Legs only -> 2=Spread/net only.
    const SPREAD_MODE_LABELS = ["All", "Legs", "Spread"];
    function refreshGreekSpreadButton() {
      const btn = $("greekSpreadBtn");
      if (!btn) return;
      const m = state.spreadMode || 0;
      btn.textContent = SPREAD_MODE_LABELS[m];
      btn.classList.toggle("active", m !== 0);
    }
    $("greekSpreadBtn").addEventListener("click", () => {
      state.spreadMode = ((state.spreadMode || 0) + 1) % 3;
      refreshGreekSpreadButton();
      render();
    });
    refreshGreekSpreadButton();
    // Walls: gamma walls (major +/-) as reference lines + a floating box with the
    // per-strike gamma variation vs 5/15/30 min.
    $("wallsToggle").addEventListener("click", async () => {
      state.showWalls = !state.showWalls;
      $("wallsToggle").classList.toggle("active", state.showWalls);
      $("wallsBox").hidden = !state.showWalls;
      if (state.showWalls) { await loadGamma(); if (state.showGammaHistory) await loadGammaHistory(); }
      else { state.gammaHistory = null; if (!state.showGamma) state.gamma = null; }
      render();
    });
    // Clock in the walls-box header: toggles the Long/Short gamma-wall history
    // (migration lines over the session). Hidden by default; shown only on click.
    $("wallsHistBtn").addEventListener("click", async ev => {
      ev.stopPropagation();
      state.showGammaHistory = !state.showGammaHistory;
      $("wallsHistBtn").classList.toggle("active", state.showGammaHistory);
      if (state.showGammaHistory && !state.gammaHistory) await loadGammaHistory();
      render();
    });
    function renderWallsBox() {
      const box = $("wallsBox");
      if (!box || box.hidden) return;
      const histBtn = $("wallsHistBtn"); if (histBtn) histBtn.classList.toggle("active", !!state.showGammaHistory);
      const g = state.gamma;
      if (!g || !Array.isArray(g.strikes) || !g.strikes.length) {
        $("wallsMeta").textContent = "sin gamma";
        $("wallsWalls").innerHTML = "";
        $("wallsRows").innerHTML = `<tr><td colspan="5" style="color:#94a3b8">Sin datos de gamma para ${esc(state.symbol)} ${esc(currentDay())}.</td></tr>`;
        return;
      }
      $("wallsMeta").innerHTML = `<span class="walls-symbol">${esc(state.symbol)}</span><span class="walls-time">${hourOnly(g.timestamp || "")}</span>`;
      const lvl = (k, v, cls) => (Number.isFinite(v)
        ? `<div class="walls-lvl"><span class="k">${k}</span><span class="v ${cls}">${fmtStrike0(v)}</span></div>` : "");
      $("wallsWalls").innerHTML =
        lvl("Long Gamma", g.major_long_gamma, "walls-pos") +
        lvl("Short Gamma", g.major_short_gamma, "walls-neg") +
        lvl("MAJOR POSITIVE", g.major_positive, "walls-pos") +
        lvl("MAJOR NEGATIVE", g.major_negative, "walls-neg") +
        lvl("Flip", g.gamma_flip, "walls-flip");
      // Symmetric band around the ATM: N strikes above + ATM + N below (ATM centered).
      const spot = Number(g.spot);
      const all = g.strikes
        .filter(s => Number.isFinite(s.strike) && Number.isFinite(s.gamma))
        .sort((a, b) => a.strike - b.strike);
      const atmIdx = all.length ? all.reduce((best, s, i) => Math.abs(s.strike - spot) < Math.abs(all[best].strike - spot) ? i : best, 0) : 0;
      const N = 10;  // strikes each side of the ATM
      const near = all.slice(Math.max(0, atmIdx - N), atmIdx + N + 1).sort((a, b) => b.strike - a.strike);
      const atmStrike = all.length ? all[atmIdx].strike : spot;
      // Per-column delta; highlight the outliers (|delta| beyond 1 std of the column):
      // green if the gamma rose, red if it fell.
      const cols = ["g5", "g15", "g30"];
      near.forEach(s => {
        s._d = {};
        for (const c of cols) s._d[c] = Number.isFinite(s.gamma) && Number.isFinite(s[c]) ? s.gamma - s[c] : null;
      });
      const stdOf = arr => {
        const v = arr.filter(Number.isFinite);
        if (v.length < 2) return 0;
        const m = v.reduce((a, b) => a + b, 0) / v.length;
        return Math.sqrt(v.reduce((a, b) => a + (b - m) ** 2, 0) / v.length);
      };
      const K = 1.0;  // sigma multiplier: solo se colorean los valores > 1 sigma (menos color, mas selectivo)
      const stdGamma = stdOf(near.map(s => s.gamma));
      const std = {};
      for (const c of cols) std[c] = stdOf(near.map(s => s._d[c]));
      // Verde/rojo a los valores cuya magnitud supera K*sigma de su columna
      // (gamma: grande verde / muy negativo rojo; deltas: sube verde / baja rojo).
      const colorCls = (v, sd) => (Number.isFinite(v) && sd > 1e-9 && Math.abs(v) > K * sd) ? (v > 0 ? "wd-up" : "wd-dn") : "";
      const dcell = (s, c) => {
        const d = s._d[c];
        if (!Number.isFinite(d)) return `<td>--</td>`;
        return `<td class="${colorCls(d, std[c])}">${d >= 0 ? "+" : "-"}${fmt2(Math.abs(d))}</td>`;
      };
      $("wallsRows").innerHTML = near.map(s =>
        `<tr class="${s.strike === atmStrike ? "atm" : ""}"><td>${fmtStrike0(s.strike)}</td>` +
        `<td class="${colorCls(s.gamma, stdGamma)}">${fmt2(s.gamma)}</td>` +
        `${dcell(s, "g5")}${dcell(s, "g15")}${dcell(s, "g30")}</tr>`
      ).join("");
    }
    // Drag the walls box by its header to move it out of the way.
    function initWallsDrag() {
      const box = $("wallsBox"), head = box && box.querySelector(".walls-head");
      if (!box || !head) return;
      let on = false, sx = 0, sy = 0, x0 = 0, y0 = 0;
      head.addEventListener("mousedown", ev => {
        if (ev.target.closest("#wallsHistBtn")) return;  // clic en el reloj no arrastra
        const r = box.getBoundingClientRect();
        box.style.right = "auto"; box.style.left = r.left + "px"; box.style.top = r.top + "px";
        on = true; x0 = r.left; y0 = r.top; sx = ev.clientX; sy = ev.clientY;
        document.body.style.userSelect = "none"; ev.preventDefault();
      });
      document.addEventListener("mousemove", ev => {
        if (!on) return;
        box.style.left = Math.max(0, x0 + ev.clientX - sx) + "px";
        box.style.top = Math.max(0, y0 + ev.clientY - sy) + "px";
      });
      document.addEventListener("mouseup", () => { on = false; document.body.style.userSelect = ""; });
    }
    initWallsDrag();
    $("chainToggle").addEventListener("click", openStratTab);
    document.addEventListener("click", ev => {
      if (ev.target.closest("#startBtn")) { startLadder(); return; }
      if (ev.target.closest(".send-btn")) { sendToExcel(); return; }
      const ocRow = ev.target.closest("#optionChainRows tr");
      if (ocRow) { loadNearAtm(ocRow.dataset.expiration); return; }
      const naRow = ev.target.closest("#nearAtmRows tr");
      const naChk = ev.target.closest("#nearAtmRows .chk");
      if (naRow && naChk) {
        if (state.strategy === "short_strangle") {
          const checkboxes = Array.from(naRow.querySelectorAll(".chk"));
          const side = checkboxes.indexOf(naChk) === 0 ? "CALL" : "PUT";
          selectStrangleLeg(naRow, side);
          renderStrategy();
          return;
        }
        if (Number(naRow.dataset.strike) === state.selectedStrike && naChk.classList.contains("on")) toggleStrikeCheckSide(naChk);
        else selectStrike(naRow);
        return;
      }
      const item = ev.target.closest(".strat-item");
      if (item) { toggleStrategy(item); return; }
      const box = ev.target.closest(".chk");
      if (box) box.classList.toggle("on");
    });
    $("csvInput").addEventListener("change", ev => {
      state.httpMode = false;
      loadFile(ev.target.files && ev.target.files[0]);
      if (state.timer) clearInterval(state.timer);
      state.timer = setInterval(refreshFile, 5000);
    });
    // Strike table (right band, under the spot card). Placeholder list for now:
    // strikes are derived from the latest spot; checkbox + L/S letter (default L).
    function buildStrikeTable(force) {
      updateStrikeTitle();
      const dateEl = $("strikeDay");
      if (dateEl && !dateEl.value) dateEl.value = new Date().toLocaleDateString("en-CA"); // session day defaults to today
      const rows = normalizedRows();
      const last = rows[rows.length - 1];
      const spot = last ? last.spot : null;
      let base, step;
      if (spot != null && isFinite(spot)) {
        step = spot >= 2000 ? 25 : spot >= 200 ? 5 : 1;
        base = Math.round(spot / step) * step;
      } else {
        base = 4200; step = 10;  // fallback before any live data
      }
      const N = 12;
      // Drop stale selections from another ticker/scale (e.g. a 4200 placeholder strike
      // left over on MU): far outside this ladder AND with no loaded data. Runs every
      // render (before the rebuild short-circuit) so a lingering junk strike is removed.
      if (spot != null && isFinite(spot)) {
        const lo = base - N * step, hi = base + N * step, margin = N * step;
        const kept = state.selected.filter(s => {
          const k = Number(s.strike);
          if (k >= lo - margin && k <= hi + margin) return true;   // within ~2x the ladder
          return !!state.series[seriesKey(s.strike)];              // or has loaded data
        });
        if (kept.length !== state.selected.length) { state.selected = kept; saveChartState(); }
      }
      const key = `${state.symbol}|${dateEl ? dateEl.value : ""}|${base}|${step}`;
      if (!force && key === state.strikeKey) return;  // keep user toggles between live ticks
      state.strikeKey = key;
      const cell = side => `<td><span class="strike-opt is-short" data-side="${side}"><span class="strike-chk"></span><span class="strike-ls">S</span></span></td>`;
      let html = "";
      for (let i = N; i >= -N; i--) {
        const k = base + i * step;
        const atmCls = k === base ? " class=\"atm\"" : "";
        html += `<tr${atmCls} data-strike="${k}"><td class="strike-val">${k}</td>${cell("put")}${cell("call")}</tr>`;
      }
      $("strikeRows").innerHTML = html;
      applyStrikeSelection();
      restoreStrikeVisualState();
    }
    // Re-mark the boxes that are in the current multi-selection (after a rebuild).
    function applyStrikeSelection() {
      document.querySelectorAll("#strikeRows .strike-opt").forEach(opt => {
        const strike = opt.closest("tr").dataset.strike;
        const on = state.selected.some(s => s.strike === strike && s.side === opt.dataset.side);
        opt.classList.toggle("on", on);
      });
    }
    function clearOptionSelections() {
      state.selected = [];
      state.series = {};
      state.userRange = null;
      state.anchorEntry = null;
      state.anchorActive = false;
      document.querySelectorAll("#strikeRows .strike-opt").forEach(opt => {
        opt.classList.remove("on", "is-long");
        opt.classList.add("is-short");
        const ls = opt.querySelector(".strike-ls");
        if (ls) ls.textContent = "S";
      });
      setAnchorDropdownValue("anchorHourDD", "anchorHour", "");
      setAnchorDropdownValue("anchorMinDD", "anchorMin", "");
      refreshAnchorStatus();
      renderAnchorPnl();
      saveChartState();
      if (!state.stratMode && state.rows.length) render();
    }
    // Click a box: toggle that contract (put/call of its strike) in the multi-selection;
    // its premium line is added/removed on the chart. Click the L/S letter to switch
    // Long/Short; this flips the leg's sign in the Spread (S=+credit, L=-debit).
    $("clearOptionsBtn").addEventListener("click", clearOptionSelections);
    // Cycle the premium lines on the chart (does NOT touch the Anchor or the strategy):
    // 0=All (legs+Spread) -> 1=None -> 2=Legs only -> 3=Spread only -> back to All.
    const PREMIUM_MODE_LABELS = ["All", "None", "Legs", "Spread"];
    function refreshHidePremiumsButton() {
      const btn = $("hidePremiumsBtn");
      if (!btn) return;
      const m = state.premiumMode || 0;
      btn.textContent = PREMIUM_MODE_LABELS[m];
      btn.classList.toggle("show-state", m !== 0);
    }
    $("hidePremiumsBtn").addEventListener("click", () => {
      state.premiumMode = ((state.premiumMode || 0) + 1) % 4;
      refreshHidePremiumsButton();
      saveChartState();
      if (state.rows.length) render();
    });
    refreshHidePremiumsButton();
    $("strikeRows").addEventListener("click", ev => {
      const opt = ev.target.closest(".strike-opt");
      if (!opt) return;
      if (ev.target.closest(".strike-ls")) {
        const ls = opt.querySelector(".strike-ls");
        const toLong = ls.textContent.trim() === "S";
        ls.textContent = toLong ? "L" : "S";
        opt.classList.toggle("is-long", toLong);
        opt.classList.toggle("is-short", !toLong);
        saveChartState();
        // A marked leg changed S<->L: redraw so the Spread reflects the new sign.
        if (opt.classList.contains("on") && !state.stratMode && state.rows.length) render();
      } else if (ev.target.closest(".strike-chk")) {
        const on = !opt.classList.contains("on");
        opt.classList.toggle("on", on);
        selectContract(opt.closest("tr").dataset.strike, opt.dataset.side, on);
      }
    });
    // Session day (calendar) changed: rebuild the ladder and refresh expirations + series.
    $("strikeDay").addEventListener("change", () => { state.userRange = null; buildStrikeTable(true); refreshAnchorStatus(); saveChartState(); refreshFile(); loadSessionExpirations(); });
    // Expiration changed: re-fetch the selected contracts for the new expiration.
    $("strikeExp").addEventListener("change", () => { state.userRange = null; if ($("nearestExp")) $("nearestExp").checked = false; saveChartState(); reloadSeries(); });
    $("nearestExp").addEventListener("change", () => {
      if (!$("nearestExp").checked) return;
      const sel = $("strikeExp");
      const opts = sel ? Array.from(sel.options).map(o => o.value).filter(Boolean) : [];
      const nearestVal = opts.find(v => (dteDays(v) ?? -1) >= 0) || opts[0];
      if (sel && nearestVal) sel.value = nearestVal;
      state.userRange = null; saveChartState(); reloadSeries();
    });
    $("symbolSelect").addEventListener("change", ev => setTicker(ev.target.value));
    window.addEventListener("resize", () => { if (state.rows.length) render(); });
    window.addEventListener("storage", ev => {
      if (ev.key === ACTIVE_STRATEGY_KEY && !state.stratMode && state.rows.length) render();
    });
    initStratMode();
    restoreChartStateBasics();
    loadChartConfig();
    loadTickers();
    initPremiumPanel();
    initAnchor();
    renderStrikeExpirationSelect("Cargando...");
    buildStrikeTable(true);  // show the table immediately (fallback strikes until data arrives)
    if (state.httpMode) {
      refreshFile();
      state.timer = setInterval(refreshFile, 5000);
    }
  </script>
</body>
