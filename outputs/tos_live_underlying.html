<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TOS Live Spot</title>
  <link rel="icon" href="/outputs/tos_live_favicon.png" type="image/png">
  <script src="https://cdn.plot.ly/plotly-3.3.1.min.js"></script>
  <style>
    :root {
      color-scheme: dark;
      --bg: #05080d;
      --panel: rgba(5, 8, 13, 0.82);
      --panel2: rgba(11, 14, 20, 0.88);
      --line: #202938;
      --grid: #15191f;
      --text: #dbeafe;
      --muted: #94a3b8;
      --cyan: #22d3ee;
      --cyan2: #0891b2;
      --green: #00e676;
      --active-text: #00e676;
      --red: #ff3b4f;
      --yellow: #ffe600;
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; }
    body {
      background:
        radial-gradient(ellipse 80% 70% at 0% 100%, rgba(8, 145, 178, 0.16), transparent 65%),
        linear-gradient(180deg, #05080d 0%, #070b10 58%, #091117 100%);
      color: var(--text);
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    .stage { position: fixed; inset: 0; background: transparent; }
    #chart { position: absolute; inset: 0 18px 0 0; }
    .app-shell { max-width: calc(100vw - 24px); }
    .topbar {
      position: fixed;
      top: 38px;
      left: 52px;
      right: 32px;
      z-index: 20;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      pointer-events: none;
    }
    .ticker-pills,
    .mode-pills,
    .right-tools {
      pointer-events: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      border: 0;
      background: transparent;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      backdrop-filter: none;
    }
    .pill, .file-btn, select {
      height: 30px;
      border-radius: 8px;
      padding: 0 14px;
      color: #e0f7ff;
      font: inherit;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .pill, .file-btn {
      border: 1px solid rgba(34,211,238,.42);
      background: rgba(5,8,13,.82);
    }
    #chainToggle { width: 42px; min-width: 42px; padding: 0; }
    #chainToggle svg { width: 17px; height: 17px; stroke-width: 2.4; }
    .strat-mode #chainToggle { display: none; }
    .pill:hover, .file-btn:hover,
    .pill.active, .file-btn.active,
    .pill.active:hover, .file-btn.active:hover {
      border-color: var(--green);
      background: rgba(0,230,118,.15);
    }
    .pill:hover, .file-btn:hover { color: #fff; }
    .pill.active, .file-btn.active,
    .pill.active:hover, .file-btn.active:hover { color: var(--active-text); }
    .greek-controls { position: absolute; top: 31px; right: 300px; z-index: 30; display: inline-flex; align-items: center; gap: 5px; }
    .greek-subs { display: inline-flex; gap: 5px;
      padding: 3px 5px; background: rgba(5,8,13,.55); border: 1px solid rgba(148,163,184,.18); border-radius: 8px; }
    .greek-subs[hidden] { display: none; }
    .greek-sub { padding: 2px 7px; font-size: 9px; }
    .greek-sub.gk-delta.active, .greek-sub.gk-delta.active:hover { border-color: #f97316; background: rgba(249,115,22,.16); color: #f97316; }
    .greek-sub.gk-gamma.active, .greek-sub.gk-gamma.active:hover { border-color: #e879f9; background: rgba(232,121,249,.16); color: #e879f9; }
    .greek-sub.gk-theta.active, .greek-sub.gk-theta.active:hover { border-color: #bdb76b; background: rgba(189,183,107,.16); color: #bdb76b; }
    .greek-sub.gk-vega.active,  .greek-sub.gk-vega.active:hover  { border-color: #a3e635; background: rgba(163,230,53,.16); color: #a3e635; }
    .file-btn.gk-spread:hover, .file-btn.gk-spread:active, .file-btn.gk-spread:focus-visible,
    .file-btn.gk-spread.active, .file-btn.gk-spread.active:hover { border-color: #1d4ed8; background: rgba(29,78,216,.22); color: #93b4ff; }
    .spread-float { font-size: 13px; padding: 6px 13px; min-width: 62px; }
    .file-btn.iv-btn.active, .file-btn.iv-btn.active:hover { border-color: #8b5cf6; background: rgba(139,92,246,.18); color: #8b5cf6; }
    .iv-float { font-size: 13px; padding: 6px 13px; }
    select { width: 74px; outline: none; appearance: none; text-align: center; border: 0; background: transparent; }
    input[type=file] { display: none; }
    .spot-card {
      position: fixed;
      left: auto;
      right: 24px;
      top: 78px;
      z-index: 22;
      width: 300px;
      min-width: 300px;
      border: 1px solid rgba(34, 211, 238, 0.36);
      background: linear-gradient(180deg, rgba(5,8,13,.86), rgba(5,8,13,.66));
      border-radius: 14px;
      padding: 14px 16px 13px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.36);
      backdrop-filter: blur(14px);
    }
    .spot-main { display: flex; align-items: center; gap: 10px; min-width: 0; }
    .spot-logo { width: 28px; height: 28px; border-radius: 6px; object-fit: contain; background: rgba(255,255,255,.94); padding: 2px; flex: 0 0 auto; }
    .spot-logo[hidden] { display: none; }
    .spot-v {
      margin-top: 4px;
      color: var(--cyan);
      font-size: 33px;
      line-height: 1;
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(34,211,238,.18);
    }
    .spot-meta { margin-top: 8px; display: flex; gap: 12px; flex-wrap: wrap; color: var(--muted); font-size: 11px; font-weight: 700; }
    .chg.pos { color: var(--green); } .chg.neg { color: var(--red); }
    /* Strike table card: docked under the spot card, all light grey. */
    .strike-card {
      position: fixed;
      right: 24px;
      top: 184px;
      z-index: 21;
      width: 300px;
      min-width: 300px;
      max-height: 470px;
      overflow: auto;
      border: 1px solid rgba(148, 163, 184, 0.30);
      background: linear-gradient(180deg, rgba(5,8,13,.86), rgba(5,8,13,.66));
      border-radius: 14px;
      padding: 12px 14px 10px;
      box-shadow: 0 20px 45px rgba(0,0,0,0.36);
      backdrop-filter: blur(14px);
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.16) transparent;
    }
    .strat-mode .strike-card, .chain-visible .strike-card, .strat-mode .strike-anchor, .chain-visible .strike-anchor { display: none; }
    .strike-head { display: flex; flex-wrap: wrap; align-items: center; gap: 6px 6px; margin-bottom: 8px; }
    .strike-brand { flex: 1 1 100%; display: flex; align-items: center; gap: 7px; min-height: 24px; }
    .strike-title-logo { width: 22px; height: 22px; border-radius: 5px; object-fit: contain; background: rgba(255,255,255,.92); padding: 1px; flex: 0 0 auto; }
    .strike-title-logo[hidden] { display: none; }
    .strike-title { color: #22d3ee; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; line-height: 1; }
    .strike-action-btn {
      height: 24px; min-width: 66px; padding: 0 10px;
      border: 1px solid rgba(34,211,238,.42); border-radius: 8px;
      background: rgba(5,8,13,.82); color: #e0f7ff;
      font: inherit; font-size: 11px; font-weight: 800; letter-spacing: .03em;
      cursor: pointer;
    }
    .hide-premiums-btn { margin-left: auto; }
    .clear-options-btn:hover { border-color: var(--red); background: rgba(255,59,79,.14); color: #fff; }
    .hide-premiums-btn:hover,
    .hide-premiums-btn:focus-visible {
      border-color: var(--green);
      background: rgba(0,230,118,.15);
      color: #fff;
    }
    .hide-premiums-btn.show-state {
      border-color: var(--green);
      background: rgba(0,230,118,.15);
      color: var(--green);
    }
    .hide-premiums-btn.show-state:hover,
    .hide-premiums-btn.show-state:focus-visible { color: var(--green); }
    /* Two controls share one row: expiration (select) + session day (calendar). */
    .strike-ctl {
      flex: 1 1 0; min-width: 0; appearance: auto; text-align: left;
      background: #1f2933; border: 1px solid rgba(148,163,184,.42);
      color: #d8dee9; border-radius: 6px; font-size: 12px; padding: 5px 6px;
      color-scheme: dark; font-weight: 600;
    }
    .strike-ctl:focus {
      border-color: rgba(34,211,238,.58);
      box-shadow: 0 0 0 2px rgba(34,211,238,.10);
    }
    #strikeExp { flex: 1 1 0; font-size: 10px; }
    .near-exp { flex: 1 1 100%; display: inline-flex; align-items: center; gap: 6px; font-size: 11px; color: #cbd5e1; cursor: pointer; margin-top: 2px; }
    .near-exp input { accent-color: #22d3ee; cursor: pointer; margin: 0; }
    #strikeDay { flex: 1 1 0; }
    .strike-ctl option { background: rgba(42, 88, 66, 0.3); color: #e5f2ff; font-weight: 700; }
    .strike-ctl option:checked { background: rgba(72, 96, 88, 0.65); color: #f8fafc; }
    .strike-table { width: 100%; border-collapse: collapse; font-size: 12px; color: #cbd5e1; }
    .strike-table th {
      color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase;
      text-align: center; padding: 4px 2px 6px; border-bottom: 1px solid rgba(148,163,184,.22);
    }
    .strike-table th:first-child { text-align: left; }
    .strike-table td { padding: 0px 2px; line-height: 1.15; text-align: center; }
    .strike-table tr { height: 18px; }
    .strike-table td.strike-val { text-align: left; color: #cbd5e1; font-weight: 700; font-variant-numeric: tabular-nums; }
    .strike-table tr.atm .strike-val { color: #ffd400; font-weight: 900; }
    .strike-opt { display: inline-flex; align-items: center; gap: 6px; justify-content: center; }
    /* Custom checkbox: empty grey box; when .on shows a check, colored by L/S. */
    .strike-chk {
      position: relative; display: inline-block; width: 14px; height: 14px;
      border: 1.5px solid #94a3b8; border-radius: 4px; cursor: pointer; flex: 0 0 auto;
    }
    .strike-opt.on .strike-chk::after {
      content: "\2713"; position: absolute; inset: -2px 0 0 0;
      text-align: center; font-size: 12px; line-height: 14px; font-weight: 900;
    }
    .strike-opt.on.is-long  .strike-chk { border-color: var(--green); }
    .strike-opt.on.is-long  .strike-chk::after { color: var(--green); }
    .strike-opt.on.is-short .strike-chk { border-color: var(--red); }
    .strike-opt.on.is-short .strike-chk::after { color: var(--red); }
    .strike-ls {
      display: inline-block; width: 12px; text-align: center;
      color: #cbd5e1; font-weight: 800; cursor: pointer; user-select: none;
    }
    .strike-opt.on.is-long  .strike-ls { color: var(--green); }
    .strike-opt.on.is-short .strike-ls { color: var(--red); }
    /* Anchor entry: independent panel below the strike card. */
    .strike-anchor {
      position: fixed; right: 24px; top: 664px; z-index: 21;
      width: 300px; min-width: 300px;
      padding: 10px 14px 9px;
      display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
      border: 1px solid rgba(148, 163, 184, 0.30);
      border-radius: 12px;
      background: linear-gradient(180deg, rgba(5,8,13,.86), rgba(5,8,13,.66));
      box-shadow: 0 20px 45px rgba(0,0,0,0.30);
      backdrop-filter: blur(14px);
    }
    .anchor-label { color: #94a3b8; font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .04em; }
    .anchor-in {
      width: 42px; appearance: auto; text-align: center; background: #1f2933; border: 1px solid rgba(148,163,184,.42);
      color: #d8dee9; border-radius: 6px; font-size: 12px; padding: 4px 4px; font-weight: 700; color-scheme: dark;
    }
    .anchor-in:focus { border-color: rgba(34,211,238,.58); box-shadow: 0 0 0 2px rgba(34,211,238,.10); outline: none; }
    .anchor-colon { color: #94a3b8; font-weight: 900; }
    /* Custom HH/MM dropdown: wheel-scroll list with the scrollbar hidden. */
    .anchor-dd {
      position: relative; width: 46px; height: 28px;
      background: #1f2933; border: 1px solid rgba(148,163,184,.42); border-radius: 6px;
      color: #d8dee9; font-size: 12px; font-weight: 700; cursor: pointer; color-scheme: dark;
      display: flex; align-items: center; justify-content: center; user-select: none;
    }
    .anchor-dd:focus { outline: none; border-color: rgba(34,211,238,.58); box-shadow: 0 0 0 2px rgba(34,211,238,.10); }
    .anchor-dd .dd-value { pointer-events: none; }
    .anchor-dd .dd-list {
      display: none; position: absolute; bottom: calc(100% + 4px); left: 0; right: 0;
      max-height: 156px; overflow-y: auto; z-index: 30;
      background: #0c1117; border: 1px solid rgba(148,163,184,.42); border-radius: 8px;
      box-shadow: 0 14px 34px rgba(0,0,0,.5);
      scrollbar-width: none; -ms-overflow-style: none;   /* hide scrollbar: Firefox/IE */
    }
    .anchor-dd .dd-list::-webkit-scrollbar { width: 0; height: 0; display: none; }  /* hide scrollbar: WebKit */
    .anchor-dd.open .dd-list { display: block; }
    .dd-opt { padding: 5px 6px; text-align: center; font-weight: 700; color: #cbd5e1; cursor: pointer; line-height: 1.1; }
    .dd-opt:hover { background: rgba(34,211,238,.16); color: #fff; }
    .dd-opt.sel { background: #1d4ed8; color: #fff; }
    .anchor-btn {
      margin-left: auto; height: 26px; padding: 0 12px; border-radius: 7px;
      border: 1px solid rgba(34,211,238,.5); background: rgba(5,8,13,.7); color: #e0f7ff;
      font: inherit; font-size: 11px; font-weight: 800; cursor: pointer; letter-spacing: .03em;
    }
    .anchor-btn:hover { border-color: var(--green); background: rgba(0,230,118,.15); color: #fff; }
    .anchor-btn.set { border-color: var(--green); background: rgba(0,230,118,.16); color: var(--active-text); }
    .anchor-btn.set:hover { color: var(--active-text); }
    .anchor-status { flex: 1 1 100%; color: #94a3b8; font-size: 10px; font-weight: 700; }
    .anchor-status.set { color: var(--green); }
    /* Anchor P&L: per-leg + spread, entry/now premium (x100) and live P&L. */
    .anchor-pnl { flex: 1 1 100%; margin-top: 6px; }
    .anchor-pnl:empty { display: none; }
    .pnl-table { width: 100%; border-collapse: collapse; font-size: 12px; font-weight: 400; font-variant-numeric: tabular-nums; }
    .pnl-table th { color: #94a3b8; font-size: 10px; font-weight: 600; text-transform: uppercase; text-align: right; padding: 2px 0 4px; border-bottom: 1px solid rgba(148,163,184,.22); }
    .pnl-table th:first-child { text-align: left; }
    /* numeric columns hug their content (narrow), grouped to the right */
    .pnl-table th:not(:first-child), .pnl-table td:not(:first-child) { width: 1%; white-space: nowrap; padding-left: 12px; }
    .pnl-table td { color: #cbd5e1; text-align: right; padding: 2px 0; white-space: nowrap; font-weight: 400; }
    .pnl-table td:first-child { text-align: left; color: #e5e7eb; font-weight: 500; }
    .pnl-side { display: inline-block; width: 34px; }  /* fixed width so the strike aligns */
    .pnl-table tfoot td { border-top: 1px solid rgba(148,163,184,.30); padding-top: 5px; font-weight: 500; color: #e5e7eb; }
    .pnl-table tfoot td:first-child { font-weight: 500; color: #cbd5e1; letter-spacing: .02em; }
    .pnl-ls-s { color: var(--red); font-weight: 600; }
    .pnl-ls-l { color: var(--green); font-weight: 600; }
    .pnl-table td.pnl-pos, .pnl-table td.pnl-neg { font-size: 14px; font-weight: 800; }
    .pnl-table td.pnl-pos { color: var(--green); }
    .pnl-table td.pnl-neg { color: var(--red); }
    /* Gamma walls + delta box (floating, left side). */
    .walls-box {
      position: fixed; left: auto; right: 400px; top: 88px; z-index: 24;
      width: 250px; max-height: calc(100vh - 150px); overflow: auto;
      border: 1px solid rgba(168,85,247,0.35);
      background: rgba(15, 8, 32, 0.60);
      border-radius: 12px; padding: 12px 14px; color: #cbd5e1;
      box-shadow: 0 20px 45px rgba(0,0,0,0.4); backdrop-filter: blur(12px);
      font-size: 12px; font-weight: 400; font-variant-numeric: tabular-nums;
      scrollbar-width: thin; scrollbar-color: rgba(148,163,184,.16) transparent;
    }
    .walls-head { cursor: move; }
    .walls-flip { color: #ffd400; }
    .walls-box[hidden] { display: none; }
    .strat-mode .walls-box { display: none; }
    .walls-head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
    .walls-title { color: #e5e7eb; font-size: 13px; font-weight: 500; }
    .walls-drag-hint { margin-left: 9px; color: #ffffff; font-size: 24px; font-weight: 900; letter-spacing: -4px; vertical-align: -4px; cursor: move; text-shadow: 0 0 5px rgba(255,255,255,.72), 0 0 14px rgba(34,211,238,.45); }
    .walls-meta { color: #94a3b8; font-size: 11px; }
    .walls-symbol { color: var(--cyan); font-size: 14px; font-weight: 700; }
    .walls-time { margin-left: 6px; }
    .walls-head-right { display: inline-flex; align-items: center; gap: 7px; }
    .walls-clock { cursor: pointer; background: transparent; border: none; padding: 0; margin: 0; display: inline-flex; align-items: center; color: #ffffff; opacity: .9; line-height: 0; }
    .walls-clock svg { width: 17px; height: 17px; }
    .walls-clock:hover { opacity: 1; color: #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,.45)); }
    .walls-clock.active { opacity: 1; color: #ffffff; filter: drop-shadow(0 0 5px rgba(255,255,255,.5)) drop-shadow(0 0 6px rgba(34,211,238,.55)); }
    .walls-levels { display: flex; flex-direction: column; gap: 4px; margin-bottom: 10px; }
    .walls-lvl { display: flex; align-items: center; justify-content: space-between; }
    .walls-lvl .k { color: #94a3b8; font-size: 10px; font-weight: 400; text-transform: uppercase; letter-spacing: .03em; }
    .walls-lvl .v { font-weight: 500; }
    .walls-pos { color: #2dd4bf; }
    .walls-neg { color: #a855f7; }
    .walls-table { width: 100%; border-collapse: collapse; font-size: 11px; }
    .walls-table th { color: #94a3b8; font-size: 9px; font-weight: 500; text-transform: uppercase; text-align: right; padding: 2px 0 4px; border-bottom: 1px solid rgba(148,163,184,.22); }
    .walls-table th:first-child { text-align: left; }
    .walls-table th:nth-child(n+2) { text-transform: none; }
    .walls-table td { text-align: right; padding: 2px 0; color: #cbd5e1; font-weight: 400; }
    .walls-table td:first-child { text-align: left; color: #e5e7eb; font-weight: 400; }
    .walls-table tr.atm td:first-child { color: #ffd400; }
    .walls-table td.wd-up { color: var(--green); } .walls-table td.wd-dn { color: var(--red); }
    .chain-visible .side-panel { display: none; }
    .option-chain-panel {
      position: fixed;
      right: 24px;
      top: 96px;
      bottom: 78px;
      z-index: 23;
      width: 318px;
      overflow: auto;
      border: 1px solid rgba(34, 211, 238, 0.28);
      border-radius: 14px;
      background: rgba(5, 8, 13, 0.84);
      box-shadow: 0 22px 46px rgba(0,0,0,0.34);
      backdrop-filter: blur(14px);
      padding: 12px 12px 10px;
      color: #dbeafe;
      font-size: 12px;
      font-weight: 500;
      scrollbar-width: thin;
      scrollbar-color: rgba(148, 163, 184, 0.16) transparent;
    }
    .option-chain-panel::-webkit-scrollbar, .near-atm-scroll::-webkit-scrollbar { width: 5px; height: 5px; }
    .option-chain-panel::-webkit-scrollbar-track, .near-atm-scroll::-webkit-scrollbar-track { background: transparent; }
    .option-chain-panel::-webkit-scrollbar-thumb, .near-atm-scroll::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.08);
      border-radius: 999px;
      border: 1px solid transparent;
      background-clip: content-box;
    }
    .option-chain-panel:hover::-webkit-scrollbar-thumb, .near-atm-scroll:hover::-webkit-scrollbar-thumb { background-color: rgba(148, 163, 184, 0.16); }
    .chk {
      display: inline-block;
      width: 15px; height: 15px;
      border: 1px solid var(--muted);
      border-radius: 4px;
      cursor: pointer;
      vertical-align: middle;
      line-height: 13px;
      text-align: center;
      margin-left: 6px;
    }
    .chk.on { border-color: var(--green); }
    .chk.on::after { content: "\2713"; color: var(--green); font-weight: 900; }
    .near-atm-table td:nth-child(2), .near-atm-table th:nth-child(2) { text-align: center; }
    .strike-pick {
      display: inline-grid;
      grid-template-columns: 15px minmax(42px, auto) 15px;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 78px;
    }
    .strike-pick .chk { margin: 0; }
    .strike-pick-head {
      display: inline-grid;
      grid-template-columns: 15px minmax(42px, auto) 15px;
      align-items: center;
      justify-content: center;
      gap: 6px;
      min-width: 78px;
    }
    .strike-pick-head span:first-child,
    .strike-pick-head span:last-child { color: var(--red); font-size: 15px; font-weight: 900; }

    function restoreChartStateBasics() {

    function restoreStrikeVisualState() {

    // Fill the expiration dropdown for the current ticker + session day.
    async function loadSessionExpirations() {
      const sel = $("strikeExp");
      if (!sel) return;
      const saved = readChartState();
      const prev = sel.value || (saved && saved.expiration) || "";
      try {
        // Full option-chain expirations (all of them, with DTE), not only the recorded ones.
        const url = new URL("/api/expirations", location.origin);
        url.searchParams.set("ticker", state.symbol);
        url.searchParams.set("ts", Date.now());
        const r = await (await fetch(url, { cache: "no-store" })).json();
        const rows = Array.isArray(r.expirations) ? r.expirations : [];
        const exps = rows.map(x => x.expiration);
        const dteOf = x => (Number.isFinite(x.dte) ? x.dte : dteDays(x.expiration));
        sel.innerHTML = rows.length
          ? rows.map(x => {
              const n = dteOf(x);
              const label = n == null ? formatShortExpiration(x.expiration) : `${formatShortExpiration(x.expiration)} - DTE ${n}`;
              return `<option value="${esc(x.expiration)}">${esc(label)}</option>`;
            }).join("")
          : `<option value="">--</option>`;
        // "Near" (default): closest upcoming expiration (smallest DTE >= 0).
        const near = $("nearestExp");
        const nearestVal = (rows.find(x => (dteOf(x) ?? -1) >= 0) || rows[0] || {}).expiration || "";
        sel.value = (near && near.checked) ? nearestVal : (exps.includes(prev) ? prev : nearestVal);
      } catch (_) { sel.innerHTML = `<option value="">--</option>`; }
      await reloadSeries();
    }

    // Fetch (and cache) the premium series for one strike at the current day+expiration.
    async function ensureSeries(strike) {
      const key = seriesKey(strike);
      if (key in state.series) return state.series[key];
      try {
        const url = new URL("/api/premium-series", location.origin);
        url.searchParams.set("ticker", state.symbol);
        url.searchParams.set("strike", strike);
        if (currentDay()) url.searchParams.set("date", currentDay());
        if (currentExp()) url.searchParams.set("expiration", currentExp());
        url.searchParams.set("ts", Date.now());
        const data = await (await fetch(url, { cache: "no-store" })).json();
        state.series[key] = (data && !data.error) ? data : null;
      } catch (_) { state.series[key] = null; }
      return state.series[key];
    }

    // Toggle a contract (strike+side) in the multi-selection and refresh the chart.
    async function selectContract(strike, side, on) {
      const i = state.selected.findIndex(s => s.strike === strike && s.side === side);
      if (on && i < 0) { state.selected.push({ strike, side }); await ensureSeries(strike); }
      else if (!on && i >= 0) { state.selected.splice(i, 1); }
      state.userRange = null;
      saveChartState();
      if (!state.stratMode) render();
    }

    // Re-fetch series for every selected strike (e.g. session day or expiration changed).
    async function reloadSeries() {

      await Promise.all(strikes.map(ensureSeries));
      if (!state.stratMode) render();
    }
    function defaultAtmStrike() {
      const m = nearAtmModel();
      const strikes = m.rows.map(([s]) => Number(s)).filter(Number.isFinite);
      if (!strikes.length) return Number(m.atm);
      const spot = Number(m.spot);
      if (Number.isFinite(spot)) {
        return strikes.reduce((best, k) => Math.abs(k - spot) < Math.abs(best - spot) ? k : best, strikes[0]);
      }
      const atm = Number(m.atm);
      if (Number.isFinite(atm)) {
        return strikes.reduce((best, k) => Math.abs(k - atm) < Math.abs(best - atm) ? k : best, strikes[0]);
      }
      return strikes[0];
    }
    function applyDefaultShortStraddle() {
      if (!state.stratMode || state.defaultStrategyApplied) return false;
      const atm = defaultAtmStrike();
      state.selectedStrike = null;
      state.selectedPutStrike = null;
      state.selectedCallStrike = null;
      if (!markStrategyChoice("short_straddle") || !markStrikeValue(atm)) return false;
      state.defaultStrategyApplied = true;
      renderStrategy();
      return true;
    }
    function strategyName(type) {

    function strategyStrikeText(d) {

      return fmt2(d.strike);
    }
    function adjacentStrangleStrikes(anchor) {
      const m = nearAtmModel();
      const strikes = m.rows.map(([s]) => Number(s)).filter(Number.isFinite).sort((a, b) => a - b);
      const lower = [...strikes].reverse().find(s => s < Number(anchor));
      const upper = strikes.find(s => s > Number(anchor));
      if (!Number.isFinite(lower) || !Number.isFinite(upper)) return null;
      return { putStrike: lower, callStrike: upper };
    }
    function toggleStrategy(item) {
      const wasOn = item.querySelector(".chk").classList.contains("on");

      if (wasOn) state.strategy = null;

    function renderStrategy() {

      if (!exp || k == null) {

        state.payoff = null;
        clearActiveStrategy();
        renderSummary(null);
        drawPayoff(null);
        render();

      }

      let legs, title, payoffArgs;
      if (state.strategy === "short_strangle") {

      box.innerHTML =
        `<div class="legs-title">${title}</div>
         <table class="legs-table">
           <thead><tr><th>symbol</th><th>exp</th><th>qty</th><th>side</th><th>type</th><th>strike</th></tr></thead>
           <tbody>${rows}</tbody>

    async function startLadder() {

    async function sendToExcel() {

      const status = $("sendStatus");
      if (!ctx) return;
      if (status) { status.textContent = "enviando..."; status.className = "send-status"; }
      try {
        const url = new URL("/api/send-to-excel", location.origin);

        url.searchParams.set("expiration", ctx.expiration);

        if (ctx.strategy === "short_strangle") {
          url.searchParams.set("put_strike", ctx.putStrike);
          url.searchParams.set("call_strike", ctx.callStrike);
        } else if (ctx.strike != null) {
          url.searchParams.set("strike", ctx.strike);
        }
        const res = await fetch(url, { cache: "no-store" });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        const legs = (data.options || []).length;
        const strategies = (data.strategies || []).length;
        if (status) { status.textContent = `OK portfolio: ${strategies} strat / ${legs} legs`; status.className = "send-status ok"; }

        if (status) { status.textContent = `ERROR ${err.message || "error"}`; status.className = "send-status err"; }

    async function loadPayoff(expiration, strike, options = {}) {
      if (state.payoffLoading) return;
      state.payoffLoading = true;
      try {
        const url = new URL("/api/payoff", location.origin);
        url.searchParams.set("ticker", state.symbol);
        url.searchParams.set("expiration", expiration);
        const strategy = options.strategy || state.strategy || "short_straddle";
        // For short_strangle with explicit strikes, don't send anchor (might not exist in chain)
        if (strategy !== "short_strangle" || options.putStrike == null || options.callStrike == null) {
          if (strike != null) url.searchParams.set("strike", strike);
        }
        url.searchParams.set("strategy", strategy);
        if (options.putStrike != null) url.searchParams.set("put_strike", options.putStrike);
        if (options.callStrike != null) url.searchParams.set("call_strike", options.callStrike);
        url.searchParams.set("ts", Date.now());
        const res = await fetch(url, { cache: "no-store" });
        const data = await res.json();
        if (data.error) { state.payoff = null; clearActiveStrategy(); renderSummary(null, data.error); drawPayoff(null); render(); return; }
        state.payoff = data;
        saveActiveStrategy(data);
        renderSummary(data);
        drawPayoff(data);
        render();
      } catch (err) {
        state.payoff = null;
        clearActiveStrategy();
        renderSummary(null, "Error al calcular el payoff.");
        drawPayoff(null);
        render();
      } finally {
        state.payoffLoading = false;
      }
    }
    // ===== STRAT driven by the marks made on the Spot tab (client-side, live greeks) =====
    // Read the marked strikes + their S/L (data, from localStorage, NOT the DOM).
    function markedLegsFromState() {
      const saved = readChartState();
      if (!saved || !Array.isArray(saved.selected)) return { legs: [], expiration: "", day: "" };
      const lsMap = new Map((saved.ls || []).map(x => [`${x.strike}|${x.side}`, x.value === "L" ? "L" : "S"]));
      const legs = saved.selected
        .filter(s => s && s.strike && (s.side === "put" || s.side === "call"))
        .map(s => ({ strike: Number(s.strike), side: s.side, ls: lsMap.get(`${s.strike}|${s.side}`) || "S" }))
        .filter(l => Number.isFinite(l.strike));
      return { legs, expiration: saved.expiration || "", day: saved.day || "" };
    }
    async function fetchLegQuote(strike, side, expiration, day) {
      const url = new URL("/api/premium-series", location.origin);
      url.searchParams.set("ticker", state.symbol);
      if (day) url.searchParams.set("date", day);
      if (expiration) url.searchParams.set("expiration", expiration);
      url.searchParams.set("strike", strike);
      url.searchParams.set("ts", Date.now());
      const data = await (await fetch(url, { cache: "no-store" })).json();
      const leg = side === "call" ? data.call : data.put;
      if (!leg || !Array.isArray(leg.last)) return null;
      const lastFinite = arr => { for (let i = (arr || []).length - 1; i >= 0; i--) { const v = Number(arr[i]); if (Number.isFinite(v)) return v; } return null; };
      return {
        prime: lastFinite(leg.last),
        delta: lastFinite(leg.delta), gamma: lastFinite(leg.gamma),
        theta: lastFinite(leg.theta), vega: lastFinite(leg.vega), iv: lastFinite(leg.impl_vol),
        dte: data.dte,
      };
    }
    async function loadMarkedPayoff() {
      if (!state.stratMode) return;
      const { legs, expiration, day } = markedLegsFromState();
      if (!legs.length) { state.payoff = null; renderSummary(null); drawPayoff(null); return; }  // sin marcas -> sin mensaje
      const quotes = await Promise.all(legs.map(l => fetchLegQuote(l.strike, l.side, expiration, day).catch(() => null)));
      const full = [];
      legs.forEach((l, i) => { const q = quotes[i]; if (q && Number.isFinite(q.prime)) full.push({ ...l, ...q }); });
      if (!full.length) { state.payoff = null; renderSummary(null); drawPayoff(null); return; }
      state.payoff = computeGenericPayoff(full, expiration);
      renderSummary(state.payoff);
      drawPayoff(state.payoff);
    }
    // Generic multi-leg payoff (expiry P&L) + net credit/debit + BEs + net LIVE greeks.
    function computeGenericPayoff(legs, expiration) {
      const mult = 100;
      const posSign = l => (l.ls === "S" ? -1 : 1);           // position greek sign (short = -)
      let net = 0;
      legs.forEach(l => { net += (l.ls === "S" ? 1 : -1) * (l.prime || 0) * mult; });  // credit(+)/debit(-)
      const ks = legs.map(l => l.strike);
      const liveRows = normalizedRows();
      const spot = liveRows.length ? liveRows[liveRows.length - 1].spot : null;
      let lo = Math.min(...ks), hi = Math.max(...ks);
      if (Number.isFinite(spot)) { lo = Math.min(lo, spot); hi = Math.max(hi, spot); }
      const pad = Math.max((hi - lo) * 0.6, hi * 0.03, 1);
      const xMin = lo - pad, xMax = hi + pad, n = 161;
      const x = Array.from({ length: n }, (_, i) => xMin + (xMax - xMin) * i / (n - 1));
      const legPnl = (l, S) => {
        const intr = l.side === "call" ? Math.max(S - l.strike, 0) : Math.max(l.strike - S, 0);
        return (l.ls === "S" ? (l.prime - intr) : (intr - l.prime)) * mult;
      };
      const expiry = x.map(S => legs.reduce((a, l) => a + legPnl(l, S), 0));
      const bes = [];
      for (let i = 1; i < x.length; i++) {
        const y0 = expiry[i - 1], y1 = expiry[i];
        if ((y0 <= 0 && y1 > 0) || (y0 >= 0 && y1 < 0)) {
          const t = y0 === y1 ? 0 : y0 / (y0 - y1);
          bes.push(x[i - 1] + (x[i] - x[i - 1]) * t);
        }
      }
      const maxP = Math.max(...expiry), maxL = Math.min(...expiry);
      const lSlope = expiry[1] - expiry[0], rSlope = expiry[n - 1] - expiry[n - 2];
      const profitUnbounded = lSlope < -1e-6 || rSlope > 1e-6;
      const lossUnbounded = lSlope > 1e-6 || rSlope < -1e-6;
      const sumG = key => legs.reduce((a, l) => a + posSign(l) * (Number.isFinite(l[key]) ? l[key] : 0) * mult, 0);
      const ivs = legs.map(l => l.iv).filter(Number.isFinite);
      return {
        generic: true, symbol: state.symbol, expiration, dte: legs[0].dte,
        legs: legs.map(l => ({ side: l.side, strike: l.strike, ls: l.ls, iv: l.iv, prime: l.prime,
          greeks: { delta: posSign(l) * (l.delta || 0) * mult, gamma: posSign(l) * (l.gamma || 0) * mult,
                    theta: posSign(l) * (l.theta || 0) * mult, vega: posSign(l) * (l.vega || 0) * mult, rho: null } })),
        net, netGreeks: { delta: sumG("delta"), gamma: sumG("gamma"), theta: sumG("theta"), vega: sumG("vega"), rho: null },
        avgIV: ivs.length ? ivs.reduce((a, b) => a + b, 0) / ivs.length : null,
        max_profit: profitUnbounded ? null : maxP, max_loss: lossUnbounded ? null : maxL,
        bes, x, expiry,
      };
    }
    function greeksTableGeneric(d) {
      const rows = d.legs.map(l => greekRow(`${l.ls === "S" ? "SHORT" : "LONG"} ${l.side.toUpperCase()} ${fmt0(l.strike)}`,
        l.greeks, pct(l.iv), fmt2(l.prime), d.dte != null ? fmt0(d.dte) : "", fmt0(l.strike))).join("");
      const net = greekRow("NET", d.netGreeks, d.avgIV != null ? pct(d.avgIV) : "--", "", "", "", "net");
      return `<table class="greeks-table">
        <thead><tr><th>Griegas</th><th>DTE</th><th>Strike</th><th>IV</th><th>Prime</th><th>Delta</th><th>Gamma</th><th>Theta/d</th><th>Vega</th><th>Rho</th></tr></thead>
        <tbody>${rows}${net}</tbody></table>`;
    }
    function drawPayoffGeneric(d) {
      const el = $("payoffChart");
      if (!el || !window.Plotly) return;

      const x = d.x, expiry = d.expiry;
      const liveRows = normalizedRows();
      const spot = liveRows.length ? liveRows[liveRows.length - 1].spot : null;
      const yPos = expiry.map(v => Math.max(v, 0)), yNeg = expiry.map(v => Math.min(v, 0));
      const posFill = { x, y: yPos, mode: "lines", line: { width: 0 }, fill: "tozeroy", fillcolor: "rgba(0,230,118,0.16)", hoverinfo: "skip", showlegend: false };
      const negFill = { x, y: yNeg, mode: "lines", line: { width: 0 }, fill: "tozeroy", fillcolor: "rgba(180,48,66,0.16)", hoverinfo: "skip", showlegend: false };
      const line = { x, y: expiry, mode: "lines", name: "PnL venc.", line: { color: "#e5f2ff", width: 2.4 }, hovertemplate: "%{x:,.0f}<br>PnL venc. %{y:,.0f}<extra></extra>" };
      const yVals = [...expiry, 0], yMin = Math.min(...yVals), yMax = Math.max(...yVals), ySpan = Math.max(yMax - yMin, 1);
      const strikeShapes = [], strikeAnnos = [], seen = new Set();
      d.legs.forEach(l => { const key = `${l.side}|${l.strike}`; if (seen.has(key)) return; seen.add(key);
        strikeShapes.push({ type: "line", xref: "x", yref: "paper", x0: l.strike, x1: l.strike, y0: 0, y1: 0.80, line: { color: "#facc15", width: 1 } });
        strikeAnnos.push({ x: l.strike, yref: "paper", y: 0.83, text: `${l.side === "call" ? "C" : "P"} ${fmt0(l.strike)} ${l.ls}`, showarrow: false, font: { color: "#facc15", size: 11 }, bgcolor: "rgba(3,7,18,0.88)", bordercolor: "#facc15", borderwidth: 1, borderpad: 3 });
